name: Generate Contribution Snake

# This workflow generates the snake animation that eats your GitHub
# contribution graph. It writes two SVGs (light + dark) to the `output`
# branch, which the README then references via raw.githubusercontent.com.
#
# When you copy this file into your real profile repo (Db2203/Db2203),
# put it at `.github/workflows/snake.yml`. The very first run can be
# triggered manually: Actions tab → "Generate Contribution Snake" →
# "Run workflow".

on:
  schedule:
    # Re-generate every 12 hours so the snake stays current.
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Publish to the `output` branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
